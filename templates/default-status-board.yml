# Default status board preset.
# Use in screens.yml:
#   - name: Services
#     template: default-status-board
#     categories:
#       - name: Claude
#         url: https://status.claude.com/api/v2/summary.json
#         type: statuspage
#         icon: anthropic
#         items:
#           - key: Overall
#             label: AI
#
# The "Overall" key uses the top-level page indicator from Statuspage.
# For single-service status, use exactly one item with key: Overall.

type: status_board
poll_interval: 30
display_duration: 30
