refresh_seconds: 30
timezone: UTC

display:
  backend: mock
  width: 122
  height: 250
  rotation: 0
  full_refresh_every_n_updates: 50

screens:
  - name: health
    type: health
    poll_interval: 30
    display_duration: 30

  - name: tamagotchi
    type: tamagotchi
    poll_interval: 5
    display_duration: 15
    options:
      url: https://lotus.therektgames.com/health
      stats_url: https://lotus.therektgames.com/stats

providers:
  - name: Claude
    type: statuspage
    url: https://status.claude.com/api/v2/summary.json
    components:
      - claude.ai
      - Claude Code
      - Claude API (api.anthropic.com)
    display_names:
      claude.ai: AI
      Claude Code: Code
      Claude API (api.anthropic.com): API

  - name: OpenAI
    type: statuspage
    url: https://status.openai.com/api/v2/summary.json
    components:
      - App
      - Conversations
      - Codex Web
      - Codex API
    display_names:
      App: App
      Conversations: Chat
      Codex Web: Web
      Codex API: API

  - name: Lotus
    type: lotus_health
    url: https://lotus.therektgames.com/health
    components: []
    display_names:
      Lotus: Live
      Queue: Queue
      Proxy: Proxy
