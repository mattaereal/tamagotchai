# Tamagotchai screen definitions.
# The scheduler cycles through each screen in order.
#
# Default: OpenCode dedicated detail screen.
# Shows full metadata from opencode-plugin-tamagotchai.
# To add more screens, duplicate the block and change the parameters,
# or run: python app.py init
#
# If the agent is offline, the screen shows setup instructions.
#
# To configure the URL, replace 127.0.0.1 with your agent machine's IP:
#   ip addr show            # (on the agent machine)
#   hostname -I             # (on the agent machine)

screens:
  - name: OpenCode
    template: opencode
    poll_interval: 5
    display_duration: 15
    stale_threshold: 120
    url: http://127.0.0.1:7788/status
